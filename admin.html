<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal - Sistem Permohonan</title>

<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
 --bg1:#1A2350;
 --bg2:#1FA2FF;
 --card:#F4F6F8;
 --accent:#12D8FA;
 --muted:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'League Spartan',sans-serif;}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2));min-height:100vh;padding:20px;}
.container{max-width:1400px;margin:auto;}

.header{
 background:var(--card);
 padding:30px;
 border-radius:20px;
 margin-bottom:30px;
 box-shadow:0 10px 30px rgba(0,0,0,0.2);
 position:relative;
}
.header h1{color:var(--bg1);}
.subtitle{color:#555;}
.logout{
 position:absolute;top:30px;right:30px;
 background:#ef4444;color:#fff;border:none;
 padding:12px 20px;border-radius:10px;
 cursor:pointer;font-weight:600;
}

.tabs{display:flex;gap:10px;margin-bottom:25px;}
.tab{
 flex:1;padding:15px;border-radius:12px;
 background:rgba(255,255,255,.2);
 color:white;font-weight:600;
 text-align:center;cursor:pointer;
 transition:.2s;
}
.tab.active{background:var(--card);color:var(--bg1);}

.content{display:none;}
.content.active{display:block;}

.qr-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
 gap:20px;
}
.qr-card{
 background:var(--card);
 padding:25px;
 border-radius:20px;
 text-align:center;
 box-shadow:0 10px 25px rgba(0,0,0,.2);
}
.qr-card h3{color:var(--bg1);margin-bottom:10px;}
.qr-box{
 background:white;
 padding:15px;
 border-radius:12px;
 margin:15px auto;
 display:flex;
 justify-content:center;
}
.btn{
 width:100%;
 padding:12px;
 background:linear-gradient(135deg,var(--bg2),var(--accent));
 color:white;border:none;
 border-radius:10px;
 font-weight:600;
 cursor:pointer;
}

.filter{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}
select,input{padding:10px;border-radius:8px;border:1px solid #ccc;flex:1;min-width:150px;}
.table-wrap{background:var(--card);border-radius:12px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{padding:12px;border-bottom:1px solid #ddd;vertical-align:top;}
th{background:var(--bg1);color:white;text-align:left;}
.loading{text-align:center;color:var(--muted);padding:20px;}

.dashboard{display:flex;gap:15px;flex-wrap:wrap;}
.card{background:var(--card);padding:20px;border-radius:12px;flex:1;min-width:180px;text-align:center;}
.card h2{color:var(--bg1);font-size:16px;margin-bottom:10px;}
.card p{font-size:28px;font-weight:700;color:var(--bg2);}

.item-list{font-size:13px;max-width:350px;line-height:1.5;}
.badge-pg{
 background:#fef3c7;
 color:#92400e;
 font-size:11px;
 padding:2px 7px;
 border-radius:4px;
 font-weight:600;
 display:inline-block;
 margin-bottom:4px;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
 <h1>Admin Portal Sistem Permohonan</h1>
 <p class="subtitle">UPSI Holdings Sdn. Bhd.</p>
 <button class="logout" onclick="logout()">Log Keluar</button>
</div>

<div class="tabs">
 <div class="tab active" onclick="tab('qr')">QR Borang</div>
 <div class="tab" onclick="tab('data')">Data Permohonan</div>
 <div class="tab" onclick="tab('dash')">Dashboard</div>
</div>

<div id="qr" class="content active">
 <div class="qr-grid" id="qrGrid"></div>
</div>

<div id="data" class="content">
 <div class="filter">
  <select id="fJenis" onchange="filterData()">
   <option value="all">Semua Jenis</option>
   <option>AlatTulis2026</option>
   <option>Kenderaan2026</option>
   <option>PermohonanKenderaan2026</option>
   <option>Projektor2026</option>
  </select>
  <select id="fBulan" onchange="filterData()">
   <option value="all">Semua Bulan</option>
   <option value="01">Januari</option>
   <option value="02">Februari</option>
   <option value="03">Mac</option>
   <option value="04">April</option>
   <option value="05">Mei</option>
   <option value="06">Jun</option>
   <option value="07">Julai</option>
   <option value="08">Ogos</option>
   <option value="09">September</option>
   <option value="10">Oktober</option>
   <option value="11">November</option>
   <option value="12">Disember</option>
  </select>
  <input id="search" placeholder="Cari nama / jabatan / item" oninput="filterData()">
 </div>
 <div style="margin-bottom:15px;">
  <button class="btn" style="width:auto; padding:10px 25px;" onclick="exportExcel()">Export Excel</button>
 </div>
 <div class="table-wrap">
  <table>
   <thead>
    <tr><th>No</th><th>Jenis</th><th>Nama</th><th>Jabatan</th><th>Butiran Permohonan</th><th>Tarikh Hantar</th></tr>
   </thead>
   <tbody id="tableData">
    <tr><td colspan="6" class="loading">Memuatkan data...</td></tr>
   </tbody>
  </table>
 </div>
</div>

<div id="dash" class="content">
 <div class="dashboard">
  <div class="card"><h2>Total Keseluruhan</h2><p id="total">0</p></div>
  <div class="card"><h2>Alat Tulis</h2><p id="alat">0</p></div>
  <div class="card"><h2>Kenderaan</h2><p id="ken">0</p></div>
  <div class="card"><h2>Permohonan Kenderaan</h2><p id="pgken">0</p></div>
  <div class="card"><h2>Projektor</h2><p id="pro">0</p></div>
 </div>
</div>

</div>

<script>
// SECURITY
if(sessionStorage.getItem('isLoggedIn')!=='true') location.href='adminlogin.html';
function logout(){ sessionStorage.clear(); location.href='adminlogin.html'; }

const FORM_URLS = [
 {label:"AlatTulis2026", url:"https://ict-upsiholdings.github.io/assetinventorysystem/index.html?jenis=AlatTulis2026"},
 {label:"Kenderaan2026", url:"https://ict-upsiholdings.github.io/assetinventorysystem/index.html?jenis=Kenderaan2026"},
 {label:"PermohonanKenderaan2026", url:"https://ict-upsiholdings.github.io/assetinventorysystem/index.html?jenis=PermohonanKenderaan2026"},
 {label:"Projektor2026", url:"https://ict-upsiholdings.github.io/assetinventorysystem/index.html?jenis=Projektor2026"}
];

const SCRIPT_URLS = [
 {label:"AlatTulis2026", url:"https://script.google.com/macros/s/AKfycbyXUmQO6701Tv7f7vl7xuFcVgdvw0vKUSUiCjNiTx_blv2XPaYL1dPenP09ulcwc6Ug6w/exec"},
 {label:"Kenderaan2026", url:"https://script.google.com/macros/s/AKfycby0eimKxmekifIZFVHw4HnQCaIVmpXQiYJ27usQpNv7v1kCVanOyqo1X-d-N4msUKnq/exec"},
 {label:"PermohonanKenderaan2026", url:"https://script.google.com/macros/s/AKfycbzv_OAsVHSyarm6mTFXILvFH0458FvV_8PUBdoSAeK3XPrn9nqhePD_CMRrpLWcsBMl/exec"},
 {label:"Projektor2026", url:"https://script.google.com/macros/s/AKfycbwp9cqsZMSqcRrB04SQLWtkR0ryjATCw113ES2cogQ3A1jlD8XOLyJ0hQ1hNJCmTknf/exec"}
];

// TAB SYSTEM
function tab(x){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
 document.querySelector(`[onclick="tab('${x}')"]`).classList.add('active');
 document.getElementById(x).classList.add('active');
 if(x==='qr') generateQR();
 if(x==='data') loadData();
 if(x==='dash') updateDash();
}

// QR GENERATION
function generateQR(){
 const g=document.getElementById('qrGrid');
 g.innerHTML='';
 FORM_URLS.forEach((f,i)=>{
  const card=document.createElement('div');
  card.className='qr-card';
  const badge = f.label === 'PermohonanKenderaan2026' ? '<span class="badge-pg">Permohonan Sahaja</span>' : '';
  card.innerHTML=`
   <h3>QR ${f.label}</h3>
   ${badge}
   <div class="qr-box"><div id="qr_${i}"></div></div>
   <button class="btn" onclick="downloadQR('qr_${i}','QR_${f.label}')">Muat Turun</button>
  `;
  g.appendChild(card);
  setTimeout(()=>new QRCode(document.getElementById(`qr_${i}`),{text:f.url,width:200,height:200}),100);
 });
}

function downloadQR(id,name){
 const c=document.querySelector(`#${id} canvas`);
 const a=document.createElement('a');
 a.href=c.toDataURL();a.download=name+'.png';a.click();
}

// FORMAT TIME 12-HOUR (PG/PTG)
function formatTime12(iso){
 if(!iso) return '-';
 const d = new Date(iso);
 if(isNaN(d)) return iso;
 
 let h = d.getHours();
 const m = String(d.getMinutes()).padStart(2,'0');
 const suffix = h >= 12 ? 'PTG' : 'PG';
 h = h % 12 || 12;
 return `${h}:${m} ${suffix}`;
}

// FORMAT FULL DATETIME
function formatDateTime(iso){
 if(!iso) return '-';
 const d = new Date(iso);
 if(isNaN(d)) return iso;
 const day = String(d.getDate()).padStart(2,'0');
 const month = String(d.getMonth()+1).padStart(2,'0');
 const year = d.getFullYear();
 return `${day}/${month}/${year} ${formatTime12(iso)}`;
}

// HELPER TO GET FIELD VALUE
function getVal(obj, ...keys) {
 for (let k of keys) {
  if (obj[k] && obj[k] !== '' && obj[k] !== '-') return obj[k];
 }
 return null;
}

// EXTRACT ITEMS LOGIC
function extractItems(d, forExport=false){
 if(d.JenisPermohonan==='PermohonanKenderaan2026'){
  const parts=[];
  const jenisKen   =getField(d,'JenisKenderaan','Jenis_kenderaan','jenis_kenderaan','jenis kenderaan','Kenderaan');
  const namaPemandu=getField(d,'NamaPemandu','Nama_pemandu','nama_pemandu','nama pemandu','Pemandu');
  const lokasi     =getField(d,'Lokasi','lokasi','Destinasi','destinasi','Tempat');
  const tujuan     =getField(d,'Tujuan','tujuan','Sebab','Keperluan');
  const tarikhRaw  =getField(d,'Tarikh','tarikh','TarikhPerjalanan','tarikh_perjalanan','TarikhPenggunaan');
  const masaRaw    =getField(d,'Masa','masa','MasaPerjalanan','masa_perjalanan','Waktu','MasaBerangkat');

  const tarikhFmt=formatTarikh(tarikhRaw);
  const masaFmt  =formatMasa(masaRaw);
 }

 // Logic for other types
 const items = [];
 const fields = ['Item','ItemDiminta','Perkara','Barang','JenisBarang','NamaBarang','ModelProjektor','ModelKenderaan'];
 fields.forEach(f => { if(d[f]) items.push(d[f]); });

 if(items.length === 0){
  const skip = ['Timestamp','Nama','Jabatan','JenisPermohonan','Email','NoTelefon'];
  for(let key in d){
   if(!skip.includes(key) && d[key] && d[key] !== '-') items.push(`${key}: ${d[key]}`);
  }
 }
 return items.length > 0 ? items.join(', ') : '-';
}

// DATA LOADING
let all=[], filtered=[];

async function loadData(){
 all=[];
 document.getElementById('tableData').innerHTML='<tr><td colspan="6" class="loading">⏳ Memuatkan data dari pelbagai sumber...</td></tr>';
 
 for(const s of SCRIPT_URLS){
  try {
   const r = await fetch(s.url);
   const d = await r.json();
   const rows = Array.isArray(d) ? d : Object.values(d).flat();
   rows.forEach(x => x.JenisPermohonan = s.label);
   all = all.concat(rows);
  } catch(e) { console.error("Gagal ambil data:", s.label); }
 }
 filterData();
}

function filterData(){
 const j = document.getElementById('fJenis').value;
 const b = document.getElementById('fBulan').value;
 const q = document.getElementById('search').value.toLowerCase();

 filtered = all.filter(d => {
  const m = d.Timestamp ? String(new Date(d.Timestamp).getMonth()+1).padStart(2,'0') : '';
  const searchContent = (d.Nama + d.Jabatan + extractItems(d)).toLowerCase();
  return (j==='all' || d.JenisPermohonan===j) &&
         (b==='all' || m===b) &&
         (searchContent.includes(q));
 });
 render();
 updateDash();
}

function render(){
 const tbody = document.getElementById('tableData');
 if(!filtered.length){
  tbody.innerHTML='<tr><td colspan="6" class="loading">Tiada rekod dijumpai.</td></tr>';
  return;
 }
 tbody.innerHTML = filtered.map((d,i)=>`
  <tr>
   <td>${i+1}</td>
   <td>${d.JenisPermohonan === 'PermohonanKenderaan2026' ? '<span class="badge-pg">Kenderaan</span>' : d.JenisPermohonan}</td>
   <td>${d.Nama || '-'}</td>
   <td>${d.Jabatan || '-'}</td>
   <td class="item-list">${extractItems(d)}</td>
   <td>${formatDateTime(d.Timestamp)}</td>
  </tr>
 `).join('');
}

function exportExcel(){
 if(!filtered.length) return alert('Tiada data untuk dieksport');
 const ws = XLSX.utils.json_to_sheet(filtered.map(d => ({
  Jenis: d.JenisPermohonan,
  Nama: d.Nama || '-',
  Jabatan: d.Jabatan || '-',
  Butiran: extractItems(d).replace(/<br>/g, ' | ').replace(/<b>|<\/b>/g, ''),
  Tarikh: formatDateTime(d.Timestamp)
 })));
 const wb = XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb, ws, 'DataPermohonan');
 XLSX.writeFile(wb, 'Permohonan_UPSI_Holdings.xlsx');
}

function updateDash(){
 document.getElementById('total').innerText = filtered.length;
 document.getElementById('alat').innerText = filtered.filter(x => x.JenisPermohonan === 'AlatTulis2026').length;
 document.getElementById('ken').innerText = filtered.filter(x => x.JenisPermohonan === 'Kenderaan2026').length;
 document.getElementById('pgken').innerText = filtered.filter(x => x.JenisPermohonan === 'PermohonanKenderaan2026').length;
 document.getElementById('pro').innerText = filtered.filter(x => x.JenisPermohonan === 'Projektor2026').length;
}

document.addEventListener('DOMContentLoaded', generateQR);
</script>
</body>
</html>
